{% extends "base.html" %}
{% block title %}logs &mdash; Chotgor{% endblock %}
{% block breadcrumb %}/ <a href="/ui/logs" class="ch-crumb">logs</a>{% endblock %}

{% block content %}
<div class="ch-shell ch-shell--wide">
<header class="ch-hero">
    <span class="ch-eyebrow ch-hero__eyebrow">stream</span>
    <div class="ch-hero__title">
        <h1 class="ch-display">logs</h1>
        <span class="ch-hero__count" id="log-count">· {{ total }} requests</span>
    </div>
</header>

<!-- タイプ別タブ -->
<div class="log-type-tabs">
    <a href="?type=chat&page=1" data-type="chat"
       class="log-type-tab {% if current_type == 'chat' %}active{% endif %}">
        Chat
    </a>
    <a href="?type=scenario&page=1" data-type="scenario"
       class="log-type-tab {% if current_type == 'scenario' %}active{% endif %}">
        Scenario
    </a>
    <a href="?type=batch&page=1" data-type="batch"
       class="log-type-tab {% if current_type == 'batch' %}active{% endif %}">
        Batch
    </a>
</div>

<div id="log-main-content">
{% include "logs_fragment.html" %}
</div>
</div>{# /.ch-shell #}

<script>
/**
 * JSON 文字列値内の生改行・CR を文字ベースで置換する。大ファイルでも O(n) で安全。
 *
 * @param {string} text - 前処理する文字列。
 * @returns {string} 制御文字を JSON エスケープに置換した文字列。
 */
function fixRawControlChars(text) {
    const out = [];
    let inStr = false;
    for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (!inStr) {
            out.push(ch);
            if (ch === '"') inStr = true;
        } else if (ch === '\\') {
            out.push(ch);
            out.push(text[++i] ?? '');
        } else if (ch === '"') {
            out.push(ch);
            inStr = false;
        } else if (ch === '\n') {
            out.push('\\n');
        } else if (ch === '\r') {
            out.push('\\r');
        } else {
            out.push(ch);
        }
    }
    return out.join('');
}

/**
 * JSON テキストを整形＋ハイライトした HTML 文字列を返す。
 * text/content/thought/system_prompt/conversation/thinking/result キーをハイライトし、
 * JSON エスケープ（\n \t \"等）を展開して改行・タブとして表示する。
 * 通常の JSON パース失敗時は NDJSON（複数行またがり対応）として解析する。
 *
 * @param {string} text - ログファイルのテキスト内容。
 * @returns {string} <pre> の中身として挿入できる HTML 文字列。
 */
function renderJsonHtml(text) {
    const HIGHLIGHT_KEYS = new Set(['text', 'content', 'thought', 'system_prompt', 'system_instruction', 'conversation', 'thinking', 'result', 'context', 'query']);
    const KV_RE = /^(\s*)"([^"]+)"(\s*:\s*)(.+)$/;

    function tryParse(t) {
        try { return JSON.parse(t); } catch {}
        const f1 = t.replace(/\\\n/g, '\\n');
        try { return JSON.parse(f1); } catch {}
        const f2 = fixRawControlChars(f1);
        try { return JSON.parse(f2); } catch {}
        // NDJSON（複数行またがり対応）
        const lines = f1.split('\n');
        const objects = [];
        const acc = [];
        for (const line of lines) {
            acc.push(line);
            try {
                objects.push(JSON.parse(fixRawControlChars(acc.join('\n'))));
                acc.length = 0;
            } catch {}
        }
        if (objects.length > 0 && acc.every(l => !l.trim())) return objects;
        return null;
    }

    const parsed = tryParse(text);
    if (!parsed) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    const pretty = JSON.stringify(parsed, null, 2);

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    /** JSON 文字列表現（両端 " 付き）の内部エスケープを展開して返す。 */
    function expandJsonStr(stripped) {
        const inner = stripped.slice(1, -1);
        return inner
            .replace(/\\\\/g, '\x00BS\x00')
            .replace(/\\"/g, '"')
            .replace(/\\n/g, '\n')
            .replace(/\\t/g, '\t')
            .replace(/\\r/g, '\r')
            .replace(/\x00BS\x00/g, '\\');
    }

    return pretty.split('\n').map(line => {
        const m = KV_RE.exec(line);
        if (m) {
            const [, indent, key, sep, valuePart] = m;
            if (HIGHLIGHT_KEYS.has(key)) {
                const trailing = valuePart.endsWith(',') ? ',' : '';
                const stripped = trailing ? valuePart.slice(0, -1) : valuePart;
                if (stripped.startsWith('"') && stripped !== '"null"' && stripped.length > 2) {
                    const inner = expandJsonStr(stripped);
                    return esc(indent)
                        + `<span class="jk">${esc('"' + key + '"')}</span>`
                        + esc(sep)
                        + `<mark class="jv">${esc(inner)}</mark>`
                        + esc(trailing);
                }
            }
        }
        return esc(line);
    }).join('\n');
}

/**
 * ツール呼び出しのログファイルをインライン展開・折りたたみする。
 * ボタンの次の兄弟要素（.log-inline-body）をトグルする。
 * 初回クリック時に /ui/logs/{messageId}/raw/{filename} を fetch してレンダリングする。
 *
 * @param {HTMLElement} btn - クリックされたボタン要素。
 * @param {string} messageId - リクエストID（8桁hex）。
 * @param {string} filename - ログファイル名。
 */
async function toggleInlineLog(btn, messageId, filename) {
    // data-filename 属性で対応する .log-inline-body を探す
    const block = btn.closest('.log-tool-block');
    const container = block
        ? block.querySelector(`.log-inline-body[data-filename="${CSS.escape(filename)}"]`)
        : null;
    if (!container) return;

    if (container.style.display !== 'none') {
        container.style.display = 'none';
        btn.textContent = btn.textContent.replace('▼', '▶');
        return;
    }
    if (!container.dataset.loaded) {
        const prev = btn.textContent;
        btn.textContent = '… ' + prev.replace('▶ ', '');
        btn.disabled = true;
        try {
            const res = await fetch(`/ui/logs/${messageId}/raw/${filename}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            container.innerHTML = '<pre class="log-inline-pre">' + renderJsonHtml(text) + '</pre>';
            container.dataset.loaded = '1';
        } catch (e) {
            container.innerHTML = `<span style="color:#c87070;font-size:0.75rem">読み込み失敗: ${e.message}</span>`;
        } finally {
            btn.disabled = false;
            btn.textContent = prev;
        }
    }
    container.style.display = '';
    btn.textContent = btn.textContent.replace('▶', '▼');
}

/**
 * ログ一覧画面の思考ブロック翻訳ボタン処理。
 * ボタンクリック時に /api/translate を呼び出し、結果を details 内に表示する。
 *
 * @param {HTMLElement} btn - クリックされた翻訳ボタン要素。
 * @param {string} text - 翻訳するテキスト。
 */
async function translateReasoning(btn, text) {
    const details = btn.closest('details.log-reasoning-block');
    const resultDiv = details ? details.querySelector('.log-translation-result') : null;
    if (!resultDiv) return;

    btn.disabled = true;
    btn.textContent = '…';

    try {
        const res = await fetch('/api/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `APIサービスエラー(${res.status})`);
        }
        const data = await res.json();
        resultDiv.innerHTML = '<hr style="border-color:rgba(255,255,255,0.1);margin:0.5rem 0">'
            + '<span style="font-size:0.7rem;color:var(--ch-t4)">翻訳</span>'
            + '<pre style="white-space:pre-wrap;font-size:0.78rem;margin-top:0.4rem">'
            + data.translation.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            + '</pre>';
        resultDiv.style.display = '';
        btn.textContent = '再翻訳';
    } catch (e) {
        console.error('[translateReasoning] エラー:', e);
        resultDiv.innerHTML = '<span style="color:#c87070;font-size:0.75rem">' + e.message + '</span>';
        resultDiv.style.display = '';
        btn.textContent = '翻訳';
    } finally {
        btn.disabled = false;
    }
}

/**
 * タブ切り替えをAJAXで行う。ページ全体を再読み込みせず、
 * #log-main-content だけを差し替えてURLをHistory APIで更新する。
 */
(function () {
    let _currentType = {{ current_type | tojson }};
    let _loading = false;

    /**
     * ログリストをAJAXで取得して差し替える。
     * @param {string} type - 'chat' / 'scenario' / 'batch'
     * @param {number} page - ページ番号（1始まり）
     * @param {boolean} pushState - History APIでURLを更新するか
     */
    async function loadLogs(type, page, pushState) {
        if (_loading) return;
        _loading = true;

        const content = document.getElementById('log-main-content');
        if (content) content.style.opacity = '0.4';

        try {
            const url = `/ui/logs/?type=${type}&page=${page}&partial=1`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const html = await res.text();

            if (content) {
                content.innerHTML = html;
                content.style.opacity = '';
            }

            // data-total から件数を読んでヘッダーを更新する
            const wrapper = content && content.firstElementChild;
            const total = wrapper && wrapper.dataset.total;
            const countEl = document.getElementById('log-count');
            if (countEl && total != null) countEl.textContent = '· ' + total + ' requests';

            // タブのアクティブ状態を切り替える
            document.querySelectorAll('.log-type-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.type === type);
            });

            _currentType = type;

            if (pushState) {
                history.pushState({ type, page }, '', `/ui/logs/?type=${type}&page=${page}`);
            }
        } catch (e) {
            console.error('[loadLogs] 取得失敗:', e);
            if (content) content.style.opacity = '';
        } finally {
            _loading = false;
        }
    }

    // タブクリックをインターセプトしてAJAX化する
    document.querySelector('.log-type-tabs').addEventListener('click', e => {
        const tab = e.target.closest('.log-type-tab');
        if (!tab) return;
        e.preventDefault();
        const type = tab.dataset.type;
        if (type === _currentType && !_loading) return;
        loadLogs(type, 1, true);
    });

    // ページネーションリンクもAJAX化する（動的に追加される要素に対応するため委譲）
    document.getElementById('log-main-content').addEventListener('click', e => {
        const link = e.target.closest('.log-pagination a');
        if (!link) return;
        e.preventDefault();
        const params = new URLSearchParams(new URL(link.href).search);
        loadLogs(params.get('type') || _currentType, parseInt(params.get('page') || '1', 10), true);
    });

    // ブラウザの戻る・進むに対応する
    window.addEventListener('popstate', e => {
        const state = e.state;
        if (state && state.type) {
            loadLogs(state.type, state.page || 1, false);
        }
    });
})();

/**
 * アコーディオン（.log-entry）を開いたとき、試行詳細を遅延ロードする。
 * 一覧描画時はファイルI/Oをスキップしているため、開くまで tool_calls は空。
 * /ui/logs/{messageId}/detail からフラグメントを fetch して差し替える。
 */
document.getElementById('log-main-content').addEventListener('toggle', async e => {
    const entry = e.target;
    if (!entry.classList.contains('log-entry') || !entry.open) return;
    const lazyEl = entry.querySelector('.log-attempts-lazy');
    if (!lazyEl || lazyEl.dataset.loaded) return;
    lazyEl.dataset.loaded = '1';
    const messageId = entry.dataset.messageId;
    if (!messageId) return;
    lazyEl.innerHTML = '<span style="color:var(--ch-t3);font-size:0.75rem;padding:0.5rem 0;display:block">読み込み中...</span>';
    try {
        const res = await fetch(`/ui/logs/${messageId}/detail`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        lazyEl.outerHTML = html;
    } catch (err) {
        lazyEl.innerHTML = `<span style="color:#c87070;font-size:0.75rem">詳細の読み込み失敗: ${err.message}</span>`;
    }
}, true);
</script>
{% endblock %}
