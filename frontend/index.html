<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chotgor</title>
    <script>
      /* テーマのちらつき防止: React マウント前に data-dark 属性を確定させる。
         保存値が無ければ OS の配色設定に従う（useTheme.ts と同じ判定）。 */
      (function () {
        try {
          var saved = localStorage.getItem("chotgor-theme");
          var dark =
            saved === "dark" ||
            (saved !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.setAttribute("data-dark", "");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
