services:
  infinity:
    image: michaelf34/infinity:latest
    ports:
      - "7997:7997"
    volumes:
      - infinity-data:/app/.cache
    restart: unless-stopped
    command: v2 --model-id cl-nagoya/ruri-v3-310m --port 7997

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped

volumes:
  infinity-data:
